<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="The Plug Market" />
    <meta name="theme-color" content="#000000" />
    <meta property="og:site_name" content="The Plug Market" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/logo-192.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Optimized font loading with font-display:swap -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <title data-rh="true">The Plug Market</title>
    <!-- Site name for Google Search + social (static so crawlers see it without JS) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "The Plug Market",
        "alternateName": ["Plug Market", "theplugmarket.in"],
        "url": "https://theplugmarket.in/",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://theplugmarket.in/browse?q={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "The Plug Market",
        "url": "https://theplugmarket.in/",
        "logo": "https://theplugmarket.in/logo.svg",
        "sameAs": ["https://www.instagram.com/the.plugmarket/"]
      }
    </script>

    <!-- Google Analytics 4 — Measurement ID: G-M950V9PN8Y -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-M950V9PN8Y"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      // send_page_view: false — page views are fired by the Analytics React component
      // so that client-side route changes are tracked correctly.
      gtag("config", "G-M950V9PN8Y", { send_page_view: false });
    </script>

    <!-- Microsoft Clarity — Project ID: vnqsd1wrtj -->
    <script type="text/javascript">
      (function (c, l, a, r, i, t, y) {
        c[a] =
          c[a] ||
          function () {
            (c[a].q = c[a].q || []).push(arguments);
          };
        t = l.createElement(r);
        t.async = 1;
        t.src = "https://www.clarity.ms/tag/" + i;
        y = l.getElementsByTagName(r)[0];
        y.parentNode.insertBefore(t, y);
      })(window, document, "clarity", "script", "vnqsd1wrtj");
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
